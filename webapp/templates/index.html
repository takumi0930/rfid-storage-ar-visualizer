
<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<title>RFIDを用いた内容物の3D可視化システム</title>

		<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  		<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    	<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
	</head>


  	<body>
	
		<h1>product in box</h1>

		<a-scene embedded arjs vr-mode-ui="enabled: false">

			<a-marker type="pattern" url="{{ url_for('static', filename='pattern-marker.patt') }}">

				<a-entity id="model_container" rotation = "-90 0 0" position = "0 -2 1">
					<a-entity
						id = "model"
						gltf-model = ""
						scale = "25 25 25">
					</a-entity>
					<a-entity position = "0 2.8 0">
						<a-plane
							width="2" 
							height="0.6" 
							color="black" 
							opacity="0.6"
							position="0 0 -0.1">
						</a-plane>
						<a-text
							id = "product_name"
							value = ""
							align = "center"
							color = "#ffffff"
							wrap-count="20"
							side="double"
							scale ="1 1 1">
						</a-text>
					</a-entity>

				</a-entity>
			</a-marker>

			<a-entity camera></a-entity>
		</a-scene>

		<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

		<script>

			const socket = io();

			socket.on('connect', () => {
				console.log('Socket.IO connected');
			});


			socket.on('db_update', data => {
				updateModel(data);
			});

			async function updateModel(data) {
				const modelContainerEntity = document.querySelector('#model_container');
				const modelEntity = document.querySelector('#model');
				const productNameEntity = document.querySelector('#product_name');

				if(data.tagDetected){		
					const res = await fetch('/api/get_model/' + data.product_id);
					const product = await res.json();

					if (modelEntity.getAttribute('gltf-model') === product.model_url) return;
					
					modelContainerEntity.setAttribute('visible', true);
					modelEntity.setAttribute('gltf-model', `/static/${product.model_url}`);
					productNameEntity.setAttribute('value', product.product_name);

				}else{
    				modelContainerEntity.setAttribute('visible', false);
					modelEntity.setAttribute('gltf-model', "");
					productNameEntity.setAttribute('value', "");
				}
			}

			//glTFの表示が暗くなる問題に対処
			document.querySelector("a-scene").renderer.gammaOutput=true;

		</script>

  	</body>
</html>
